<!DOCTYPE html>
<html>
<head>
  <title>Antitesis.id</title>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body style="background-image: url('/images/bg-filsafat.jpg?v=2'); background-size: cover; background-position: center; background-repeat: no-repeat; background-attachment: fixed; background-color: black;">
  <h1>Selamat Datang di Antitesis</h1>
  
  <script>
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on("init", user => {
        if (!user) {
          window.netlifyIdentity.on("login", () => {
            document.location.href = "/admin/";
          });
        }
      });
    }
  </script>
</body>
</html>
