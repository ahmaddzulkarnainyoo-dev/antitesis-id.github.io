backend:
  name: github
  repo: ahmaddzulkarnainyoo-dev/antitesis-id.github.io # Ganti ini kalau nama repo lo beda
  branch: main

media_folder: "static/images" # Tempat admin upload gambar
public_folder: "/images"

collections:
  - name: "post"
    label: "Berita / Artikel"
    folder: "content/posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - {label: "Judul", name: "title", widget: "string"}
      - {label: "Tanggal", name: "date", widget: "datetime"}
      - {label: "Gambar Utama", name: "featured_image", widget: "image", required: false}
      - {label: "Isi Berita", name: "body", widget: "markdown"}
