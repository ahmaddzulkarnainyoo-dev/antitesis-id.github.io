name: Deploy Hugo site to Pages

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: Force Clone Theme
        run: |
          mkdir -p themes
          rm -rf themes/ananke
          git clone https://github.com/theNewDynamic/gohugo-theme-ananke.git themes/ananke

      - name: Install Theme Manually
        run: |
          mkdir -p themes
          rm -rf themes/ananke
          git clone --depth 1 https://github.com/theNewDynamic/gohugo-theme-ananke.git themes/ananke

      - name: Build with Hugo
        run: |
          hugo --gc --minify --baseURL "https://ahmaddzulkarnainyoo-dev.github.io/antitesis-id.github.io/"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        
